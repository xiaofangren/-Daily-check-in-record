<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="日常打卡">
  <meta name="theme-color" content="#4A90D9">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>日常打卡</title>
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1 id="header-title">日常打卡</h1>
    </header>

    <main id="app-main">
      <section id="checkin-view" class="view active">
        <div id="today-info" class="today-info"></div>
        <div id="checkin-grid" class="checkin-grid"></div>
        <div id="empty-state" class="empty-state" style="display:none;">
          <div class="empty-icon">📋</div>
          <p>还没有打卡项目</p>
          <p class="empty-hint">点击右下角 + 添加打卡项</p>
        </div>
      </section>

      <section id="accounting-view" class="view">
        <div class="acct-month-nav">
          <button id="acct-month-prev" class="acct-month-btn">‹</button>
          <span id="acct-month-label" class="acct-month-label"></span>
          <button id="acct-month-next" class="acct-month-btn">›</button>
        </div>
        <div class="acct-summary">
          <div class="acct-summary-item">
            <span class="acct-summary-label">支出</span>
            <span id="acct-month-expense" class="acct-summary-value expense">¥0.00</span>
          </div>
          <div class="acct-summary-item">
            <span class="acct-summary-label">收入</span>
            <span id="acct-month-income" class="acct-summary-value income">¥0.00</span>
          </div>
          <div class="acct-summary-item">
            <span class="acct-summary-label">结余</span>
            <span id="acct-month-balance" class="acct-summary-value">¥0.00</span>
          </div>
        </div>
        <div class="acct-chart-section">
          <div id="acct-pie-chart" class="acct-pie-chart"></div>
        </div>
        <div class="acct-filter-bar">
          <input type="date" id="acct-date-filter" class="acct-date-filter">
          <button id="acct-clear-filter" class="acct-clear-filter" style="display:none;">清除</button>
        </div>
        <div id="acct-bill-list" class="acct-bill-list"></div>
        <button id="acct-fab" class="acct-fab">+</button>
      </section>

      <section id="history-view" class="view">
        <div id="calendar-container" class="calendar-container"></div>
        <div id="history-filter" class="history-filter">
          <select id="filter-item">
            <option value="all">全部项目</option>
          </select>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>

      <section id="settings-view" class="view">
        <div class="settings-group">
          <h3 class="settings-title">音效设置</h3>
          <div class="sound-setting">
            <span class="sound-setting-label">点击音效</span>
            <button id="sound-toggle" class="sound-toggle" onclick="toggleSound()"></button>
          </div>
          <div class="sound-setting" id="sound-volume-row">
            <span class="sound-setting-label">音量</span>
            <div class="sound-volume-area">
              <span class="sound-volume-icon">🔈</span>
              <input type="range" id="sound-volume" class="sound-volume-slider" min="0" max="1" step="0.05" value="0.5" oninput="setSoundVolume(this.value); updateVolumeSlider();">
              <span id="sound-volume-label" class="sound-volume-label">50%</span>
            </div>
          </div>
        </div>
        <div class="settings-group">
          <h3 class="settings-title">打卡数据</h3>
          <button id="btn-export" class="settings-btn">📤 导出打卡 CSV</button>
          <button id="btn-import" class="settings-btn">📥 导入打卡 CSV</button>
          <input type="file" id="import-file" accept=".csv" style="display:none">
        </div>
        <div class="settings-group">
          <h3 class="settings-title">记账数据</h3>
          <button id="btn-export-acct" class="settings-btn">💰 导出记账 CSV</button>
          <button id="btn-import-acct" class="settings-btn">💰 导入记账 CSV</button>
          <input type="file" id="import-file-acct" accept=".csv" style="display:none">
        </div>
        <div class="settings-group">
          <h3 class="settings-title">数据管理</h3>
          <button id="btn-clear" class="settings-btn danger">🗑️ 清除全部数据</button>
        </div>
        <div class="settings-group">
          <h3 class="settings-title">关于</h3>
          <p class="settings-text">日常打卡 v1.5</p>
          <p class="settings-text">纯前端 PWA 应用，数据存储在本地</p>
          <p id="storage-info" class="settings-text storage-info"></p>
        </div>
      </section>
    </main>

    <nav id="tab-bar" class="tab-bar">
      <button class="tab-item active" data-view="checkin-view">
        <span class="tab-icon">✅</span>
        <span class="tab-label">打卡</span>
      </button>
      <button class="tab-item" data-view="accounting-view">
        <span class="tab-icon">💰</span>
        <span class="tab-label">记账</span>
      </button>
      <button class="tab-item" data-view="history-view">
        <span class="tab-icon">📅</span>
        <span class="tab-label">历史</span>
      </button>
      <button class="tab-item" data-view="settings-view">
        <span class="tab-icon">⚙️</span>
        <span class="tab-label">设置</span>
      </button>
    </nav>

    <button id="fab-add" class="fab" aria-label="添加打卡项">+</button>
  </div>

  <div id="add-bill-overlay" class="add-bill-overlay" style="display:none;">
    <div class="add-bill-panel">
      <div class="add-bill-header">
        <span class="add-bill-title">记一笔</span>
        <button class="add-bill-close" onclick="closeAddBillPanel()">✕</button>
      </div>
      <div class="add-bill-type">
        <button id="acct-type-expense" class="add-bill-type-btn active">支出</button>
        <button id="acct-type-income" class="add-bill-type-btn">收入</button>
      </div>
      <div class="add-bill-amount-row">
        <span class="add-bill-currency">¥</span>
        <span id="bill-amount-display" class="add-bill-amount">0.00</span>
      </div>
      <div id="bill-hint" class="bill-hint" style="display:none;"></div>
      <div id="category-grid" class="category-grid"></div>
      <div class="add-bill-meta">
        <input type="date" id="bill-date-input" class="add-bill-date">
        <input type="text" id="bill-note-input" class="add-bill-note" placeholder="添加备注..." maxlength="30">
      </div>
      <div class="numpad">
        <button class="numpad-key" data-key="1">1</button>
        <button class="numpad-key" data-key="2">2</button>
        <button class="numpad-key" data-key="3">3</button>
        <button class="numpad-key" data-key="4">4</button>
        <button class="numpad-key" data-key="5">5</button>
        <button class="numpad-key" data-key="6">6</button>
        <button class="numpad-key" data-key="7">7</button>
        <button class="numpad-key" data-key="8">8</button>
        <button class="numpad-key" data-key="9">9</button>
        <button class="numpad-key" data-key=".">.</button>
        <button class="numpad-key" data-key="0">0</button>
        <button class="numpad-key" data-key="00">00</button>
        <button class="numpad-key numpad-delete" data-key="delete">⌫</button>
        <button id="numpad-confirm" class="numpad-confirm">✓</button>
      </div>
    </div>
  </div>

  <div id="detail-overlay" class="detail-overlay">
    <div class="detail-panel">
      <div class="detail-header">
        <button class="detail-back" onclick="closeItemDetail()">‹ 返回</button>
        <div class="detail-title-area">
          <span id="detail-icon" class="detail-title-icon"></span>
          <span id="detail-name" class="detail-title-name"></span>
        </div>
        <div style="width:48px"></div>
      </div>
      <div id="detail-color-bar" class="detail-color-bar"></div>
      <div class="detail-scroll">
        <div class="detail-month-nav">
          <button class="detail-month-btn" onclick="detailPrevMonth()">‹</button>
          <span id="detail-month-label" class="detail-month-label"></span>
          <button class="detail-month-btn" onclick="detailNextMonth()">›</button>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">月度热力图</div>
          <div id="detail-heatmap" class="detail-chart-area"></div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">统计概览</div>
          <div id="detail-stats" class="detail-stats-grid"></div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">星期分布</div>
          <div id="detail-weekday" class="detail-chart-area"></div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">每日打卡次数</div>
          <div id="detail-bar" class="detail-chart-area"></div>
        </div>
        <div id="detail-recent" class="detail-section"></div>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div id="modal" class="modal">
      <div class="modal-header">
        <h2 id="modal-title">添加打卡项</h2>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="item-name">项目名称</label>
          <input type="text" id="item-name" placeholder="如：洗头、运动、喝水" maxlength="20" required>
        </div>
        <div class="form-group">
          <label>选择图标</label>
          <div id="icon-picker" class="icon-picker"></div>
        </div>
        <div class="form-group">
          <label>选择颜色</label>
          <div id="color-picker" class="color-picker"></div>
        </div>
        <div class="form-group">
          <label>快速添加模板</label>
          <div id="template-list" class="template-list"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-delete-item" class="btn btn-danger" style="display:none;">删除</button>
        <button id="btn-cancel" class="btn btn-secondary">取消</button>
        <button id="btn-save" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <div id="quick-menu-overlay" class="quick-menu-overlay" style="display:none;" onclick="closeQuickMenu()">
    <div id="quick-menu" class="quick-menu" onclick="event.stopPropagation()">
      <div class="quick-menu-header">
        <span id="quick-menu-icon" class="quick-menu-icon"></span>
        <span id="quick-menu-name" class="quick-menu-name"></span>
      </div>
      <div id="quick-menu-color" class="quick-menu-color"></div>
      <div class="quick-menu-items">
        <button class="quick-menu-item" onclick="openDetailFromQuickMenu()">📊 查看详情</button>
        <button class="quick-menu-item" onclick="openEditFromQuickMenu()">✏️ 编辑项目</button>
        <button class="quick-menu-item danger" onclick="deleteFromQuickMenu()">🗑️ 删除项目</button>
      </div>
      <button class="quick-menu-cancel" onclick="closeQuickMenu()">取消</button>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>
  <div id="siri-confirm" class="siri-confirm" style="display:none;">
    <div class="siri-confirm-content">
      <div class="siri-icon">✅</div>
      <p id="siri-message"></p>
      <button id="siri-close" class="btn btn-primary">好的</button>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/accounting-db.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/accounting.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

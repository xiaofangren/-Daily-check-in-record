<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="日常打卡">
  <meta name="theme-color" content="#4A90D9">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>日常打卡</title>
</head>
<body>
  <div id="app">
    <header id="app-header">
      <h1 id="header-title">日常打卡</h1>
    </header>

    <main id="app-main">
      <section id="checkin-view" class="view active">
        <div id="today-info" class="today-info"></div>
        <div id="checkin-grid" class="checkin-grid"></div>
        <div id="empty-state" class="empty-state" style="display:none;">
          <div class="empty-icon">📋</div>
          <p>还没有打卡项目</p>
          <p class="empty-hint">点击右下角 + 添加打卡项</p>
        </div>
      </section>

      <section id="history-view" class="view">
        <div id="calendar-container" class="calendar-container"></div>
        <div id="history-filter" class="history-filter">
          <select id="filter-item">
            <option value="all">全部项目</option>
          </select>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>

      <section id="settings-view" class="view">
        <div class="settings-group">
          <h3 class="settings-title">数据管理</h3>
          <button id="btn-export" class="settings-btn">📤 导出 CSV 备份</button>
          <button id="btn-import" class="settings-btn">📥 导入 CSV 数据</button>
          <input type="file" id="import-file" accept=".csv" style="display:none">
          <button id="btn-clear" class="settings-btn danger">🗑️ 清除全部数据</button>
        </div>
        <div class="settings-group">
          <h3 class="settings-title">Siri 快捷指令</h3>
          <a href="siri-guide.html" class="settings-btn link">📖 配置教程</a>
        </div>
        <div class="settings-group">
          <h3 class="settings-title">关于</h3>
          <p class="settings-text">日常打卡 v1.2</p>
          <p class="settings-text">纯前端 PWA 应用，数据存储在本地</p>
          <p id="storage-info" class="settings-text storage-info"></p>
        </div>
      </section>
    </main>

    <nav id="tab-bar" class="tab-bar">
      <button class="tab-item active" data-view="checkin-view">
        <span class="tab-icon">✅</span>
        <span class="tab-label">打卡</span>
      </button>
      <button class="tab-item" data-view="history-view">
        <span class="tab-icon">📅</span>
        <span class="tab-label">历史</span>
      </button>
      <button class="tab-item" data-view="settings-view">
        <span class="tab-icon">⚙️</span>
        <span class="tab-label">设置</span>
      </button>
    </nav>

    <button id="fab-add" class="fab" aria-label="添加打卡项">+</button>
  </div>

  <div id="detail-overlay" class="detail-overlay">
    <div class="detail-panel">
      <div class="detail-header">
        <button class="detail-back" onclick="closeItemDetail()">‹ 返回</button>
        <div class="detail-title-area">
          <span id="detail-icon" class="detail-title-icon"></span>
          <span id="detail-name" class="detail-title-name"></span>
        </div>
        <div style="width:48px"></div>
      </div>
      <div id="detail-color-bar" class="detail-color-bar"></div>
      <div class="detail-scroll">
        <div class="detail-month-nav">
          <button class="detail-month-btn" onclick="detailPrevMonth()">‹</button>
          <span id="detail-month-label" class="detail-month-label"></span>
          <button class="detail-month-btn" onclick="detailNextMonth()">›</button>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">月度热力图</div>
          <div id="detail-heatmap" class="detail-chart-area"></div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">统计概览</div>
          <div id="detail-stats" class="detail-stats-grid"></div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">星期分布</div>
          <div id="detail-weekday" class="detail-chart-area"></div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">每日打卡次数</div>
          <div id="detail-bar" class="detail-chart-area"></div>
        </div>
        <div id="detail-recent" class="detail-section"></div>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div id="modal" class="modal">
      <div class="modal-header">
        <h2 id="modal-title">添加打卡项</h2>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="item-name">项目名称</label>
          <input type="text" id="item-name" placeholder="如：洗头、运动、喝水" maxlength="20" required>
        </div>
        <div class="form-group">
          <label>选择图标</label>
          <div id="icon-picker" class="icon-picker"></div>
        </div>
        <div class="form-group">
          <label>选择颜色</label>
          <div id="color-picker" class="color-picker"></div>
        </div>
        <div class="form-group">
          <label>快速添加模板</label>
          <div id="template-list" class="template-list"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-delete-item" class="btn btn-danger" style="display:none;">删除</button>
        <button id="btn-cancel" class="btn btn-secondary">取消</button>
        <button id="btn-save" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <div id="quick-menu-overlay" class="quick-menu-overlay" style="display:none;" onclick="closeQuickMenu()">
    <div id="quick-menu" class="quick-menu" onclick="event.stopPropagation()">
      <div class="quick-menu-header">
        <span id="quick-menu-icon" class="quick-menu-icon"></span>
        <span id="quick-menu-name" class="quick-menu-name"></span>
      </div>
      <div id="quick-menu-color" class="quick-menu-color"></div>
      <div class="quick-menu-items">
        <button class="quick-menu-item" onclick="openDetailFromQuickMenu()">
          📊 查看详情
        </button>
        <button class="quick-menu-item" onclick="openEditFromQuickMenu()">
          ✏️ 编辑项目
        </button>
        <button class="quick-menu-item danger" onclick="deleteFromQuickMenu()">
          🗑️ 删除项目
        </button>
      </div>
      <button class="quick-menu-cancel" onclick="closeQuickMenu()">取消</button>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none;"></div>
  <div id="siri-confirm" class="siri-confirm" style="display:none;">
    <div class="siri-confirm-content">
      <div class="siri-icon">✅</div>
      <p id="siri-message"></p>
      <button id="siri-close" class="btn btn-primary">好的</button>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
